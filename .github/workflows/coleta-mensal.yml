name: Coleta mensal de dados climáticos

on:
  schedule:
    # Roda às 06:00 UTC no dia 2 de cada mês (dá tempo dos dados do mês
    # anterior já estarem consolidados nas fontes oficiais)
    - cron: "0 6 2 * *"
  workflow_dispatch: {}  # permite rodar manualmente pela aba Actions

permissions:
  contents: write

jobs:
  coletar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar coleta mensal
        env:
          HIDROWEB_IDENTIFICADOR: ${{ secrets.HIDROWEB_IDENTIFICADOR }}
          HIDROWEB_SENHA: ${{ secrets.HIDROWEB_SENHA }}
        run: python main.py

      - name: Commitar dados atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Coleta automática: $(date +'%Y-%m')"
          git push
